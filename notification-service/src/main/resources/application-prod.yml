server:
  port: 8088

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}/auth/oauth2/jwks

  datasource:
    url: jdbc:postgresql://postgres:5432/dentistdss
    username: dentistdss
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Mail Configuration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  issuer: ${JWT_ISSUER:https://api.mizhifei.press}
  audience: ${JWT_AUDIENCE:dentistdss-api}

# OpenAPI/SpringDoc Configuration - DISABLED for production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    preferIpAddress: false

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info  # Minimal exposure for production
  endpoint:
    health:
      show-details: when-authorized
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO
    root: INFO

# App Configuration
app:
  email-verification:
    token-expiry-minutes: 43200 # 30 days in minutes
    code-expiry-minutes: 10 # 10 minutes in minutes
    base-url: ${BASE_URL:https://dentist.mizhifei.press}
  email:
    from-email: ${MAIL_USERNAME}
  security:
    service-auth:
      private-key: ${SERVICE_AUTH_PRIVATE_KEY:}
      key-id: ${SERVICE_AUTH_KEY_ID:}
      service-name: notification-service
      audience: notification-service
      trusted-keys:
        auth:
          key-id: ${SERVICE_AUTH_KEY_ID_AUTH:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_AUTH:}
          subject: auth-service
          scopes:
            - notification:email
        appointment:
          key-id: ${SERVICE_AUTH_KEY_ID_APPOINTMENT:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_APPOINTMENT:}
          subject: appointment-service
          scopes:
            - notification:send
        clinicalrecords:
          key-id: ${SERVICE_AUTH_KEY_ID_CLINICALRECORDS:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_CLINICALRECORDS:}
          subject: clinical-records-service
          scopes:
            - notification:send
