server:
  port: 8088

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://localhost:8081}/auth/oauth2/jwks

  datasource:
    url: jdbc:postgresql://localhost:5432/dentistdss
    username: dentistdss
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  # Schema migrations: Flyway applies the baseline bundled in the db-migrations
  # module (classpath:db/migration). Databases without flyway_schema_history
  # are baselined at version 1 (V1 is skipped, schema untouched); fresh
  # databases get V1 applied before Hibernate validates the schema.
  flyway:
    baseline-on-migrate: true
    baseline-version: '1'
    fail-on-missing-locations: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  issuer: ${JWT_ISSUER:http://localhost:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: false

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

# OpenAPI/SpringDoc Configuration - enabled for development
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    press.mizhifei.dentist: DEBUG

# App Configuration
app:
  email-verification:
    token-expiry-minutes: 43200 # 30 days in minutes
    code-expiry-minutes: 10 # 10 minutes in minutes
    base-url: ${BASE_URL:http://localhost:3000}
  email:
    from-email: ${MAIL_USERNAME}
  # Service credentials: notification-service is both a caller (its own key
  # signs user-profile contact reads) and a target (auth-service may send
  # email; appointment/clinical-records may create in-app notifications).
  # Empty key material stays dormant at startup; verification then fails
  # closed at request time.
  security:
    service-auth:
      private-key: ${SERVICE_AUTH_PRIVATE_KEY:}
      key-id: ${SERVICE_AUTH_KEY_ID:}
      service-name: notification-service
      audience: notification-service
      trusted-keys:
        auth:
          key-id: ${SERVICE_AUTH_KEY_ID_AUTH:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_AUTH:}
          subject: auth-service
          scopes:
            - notification:email
        appointment:
          key-id: ${SERVICE_AUTH_KEY_ID_APPOINTMENT:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_APPOINTMENT:}
          subject: appointment-service
          scopes:
            - notification:send
        clinicalrecords:
          key-id: ${SERVICE_AUTH_KEY_ID_CLINICALRECORDS:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_CLINICALRECORDS:}
          subject: clinical-records-service
          scopes:
            - notification:send