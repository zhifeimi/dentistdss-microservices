server:
  port: 8084

spring:
  application:
    name: genai-service
  codec:
    max-in-memory-size: ${GENAI_MAX_REQUEST_BYTES:64KB}
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888
  mongodb:
    uri: mongodb://dentistdss:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/dentistdss?authSource=admin
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}/auth/oauth2/jwks
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2s
  ai:
    model:
      chat: google-genai
    google:
      genai:
        project-id: ${VERTEX_AI_PROJECT_ID:}
        location: ${VERTEX_AI_LOCATION:us-central1}
        chat:
          model: ${GEMINI_MODEL:gemini-2.5-flash}
          temperature: ${GEMINI_TEMPERATURE:0.7}
          max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:4096}

jwt:
  issuer: ${JWT_ISSUER:http://api-gateway:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}

app:
  security:
    genai-service-auth:
      public-key: ${GENAI_SERVICE_AUTH_PUBLIC_KEY:}
      key-id: ${GENAI_SERVICE_AUTH_KEY_ID:}
    anonymous-session:
      namespace: ${ANONYMOUS_SESSION_NAMESPACE:docker}

# GenAI Provider Configuration
genai:
  prompt:
    max-characters: ${GENAI_MAX_PROMPT_CHARACTERS:8000}
  rate-limit:
    capacity: ${GENAI_RATE_LIMIT_CAPACITY:10000}
    refill-period: ${GENAI_RATE_LIMIT_REFILL_PERIOD:PT3M}
    max-concurrent-streams: ${GENAI_MAX_CONCURRENT_STREAMS:2}
    stream-lease: ${GENAI_STREAM_LEASE:PT10M}
  conversation:
    max-history-messages: ${GENAI_MAX_HISTORY_MESSAGES:10}
    max-stored-messages: ${GENAI_MAX_STORED_MESSAGES:50}
  providers:
    google-gen-ai:
      enabled: ${VERTEX_AI_ENABLED:true}
      project-id: ${VERTEX_AI_PROJECT_ID:}
      location: ${VERTEX_AI_LOCATION:us-central1}
      default-model: ${GEMINI_MODEL:gemini-2.5-flash}
      max-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:4096}
      temperature: ${GEMINI_TEMPERATURE:0.7}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://discovery-server:8761/eureka}
  instance:
    preferIpAddress: false



# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues
# OpenAPI/SpringDoc Configuration - enabled for docker development
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO