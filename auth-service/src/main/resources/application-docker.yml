server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888
  jmx:
    enabled: false

  # Database Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://postgres:5432/dentistdss
    username: dentistdss
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2s

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    preferIpAddress: false

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

# OpenAPI/SpringDoc Configuration - enabled for docker development
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT Configuration
jwt:
  expiration: 300000 # 5 minutes in milliseconds
  issuer: ${JWT_ISSUER:http://api-gateway:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY:}
    public-key: ${JWT_RSA_PUBLIC_KEY:}
    key-id: ${JWT_RSA_KEY_ID:dentistdss}

logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO

# App Configuration
app:
  email-verification:
    code-expiry-minutes: 10
    code-pepper: ${EMAIL_VERIFICATION_CODE_PEPPER}
    base-url: ${BASE_URL:http://localhost:3000}
  oauth:
    google-client-id: ${GOOGLE_CLIENT_ID}
  security:
    refresh-token-days: 30
    cookies:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    # Outbound service credentials (sub auth-service) for audit-service and
    # notification-service calls. Empty defaults keep the Feign interceptors
    # dormant until keys are provisioned.
    service-auth:
      private-key: ${SERVICE_AUTH_PRIVATE_KEY:}
      key-id: ${SERVICE_AUTH_KEY_ID:}
      service-name: auth-service
