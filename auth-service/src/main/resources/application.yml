server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@localhost:8888
  jmx:
    enabled: false


  # Database Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/dentistdss
    username: dentistdss
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  # Schema migrations: Flyway applies the baseline bundled in the db-migrations
  # module (classpath:db/migration). Databases without flyway_schema_history
  # are baselined at version 1 (V1 is skipped, schema untouched); fresh
  # databases get V1 applied before Hibernate validates the schema.
  flyway:
    baseline-on-migrate: true
    baseline-version: '1'
    fail-on-missing-locations: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s


eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: false

# Feign client tuning: audit emission is best-effort and must never stall
# request threads waiting on the audit service.
feign:
  client:
    config:
      audit-service:
        connect-timeout: 1000
        read-timeout: 2000

# JWT Configuration
jwt:
  expiration: 300000 # 5 minutes in milliseconds
  issuer: ${JWT_ISSUER:http://localhost:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY:}
    public-key: ${JWT_RSA_PUBLIC_KEY:}
    key-id: ${JWT_RSA_KEY_ID:dentistdss}

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

# OpenAPI/SpringDoc Configuration - enabled for development
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    press.mizhifei.dentist: DEBUG
    org.springframework: DEBUG
    root: DEBUG

# App Configuration
app:
  email-verification:
    code-expiry-minutes: 10
    code-pepper: ${EMAIL_VERIFICATION_CODE_PEPPER:dev-only-change-me}
    base-url: ${BASE_URL:http://localhost:3000}
  oauth:
    google-client-id: ${GOOGLE_CLIENT_ID}
  security:
    refresh-token-days: 30
    # Durable outbox for Redis session-family tombstones. Every database
    # revocation records a pending row before the synchronous publication is
    # attempted; the replay worker retries failures and the sweep re-enqueues
    # revoked families whose Redis state key is missing.
    outbox:
      enabled: ${SECURITY_OUTBOX_ENABLED:true}
      replay-delay-ms: ${SECURITY_OUTBOX_REPLAY_DELAY_MS:30000}
      replay-initial-delay-ms: ${SECURITY_OUTBOX_REPLAY_INITIAL_DELAY_MS:15000}
      retry-backoff-ms: ${SECURITY_OUTBOX_RETRY_BACKOFF_MS:30000}
      replay-batch-size: ${SECURITY_OUTBOX_REPLAY_BATCH_SIZE:100}
      sweep-enabled: ${SECURITY_OUTBOX_SWEEP_ENABLED:true}
      sweep-delay-ms: ${SECURITY_OUTBOX_SWEEP_DELAY_MS:300000}
      sweep-initial-delay-ms: ${SECURITY_OUTBOX_SWEEP_INITIAL_DELAY_MS:60000}
      sweep-batch-size: ${SECURITY_OUTBOX_SWEEP_BATCH_SIZE:500}
    cookies:
      secure: false
      same-site: Lax
    # Outbound service credentials: this service signs 30-second RS256
    # credentials (sub auth-service) for its Feign calls to audit-service
    # and notification-service. Empty defaults keep the Feign interceptors
    # dormant locally until keys are provisioned; targets then reject the
    # unauthenticated calls exactly as before.
    service-auth:
      private-key: ${SERVICE_AUTH_PRIVATE_KEY:}
      key-id: ${SERVICE_AUTH_KEY_ID:}
      service-name: auth-service
