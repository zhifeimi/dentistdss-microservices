name: Backend CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 17 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: backend-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build
        run: ./mvnw --batch-mode --no-transfer-progress package -Pprod -DskipTests

      - name: Analyze
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          category: /language:java-kotlin
