name: Publish and deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      backend_tag:
        description: Existing immutable sha-<40 hex characters> image tag
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: homelab-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_tag || format('sha-{0}', github.sha) }}

jobs:
  package:
    if: github.event_name == 'push'
    name: Package backend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode --no-transfer-progress package -Pprod

      - name: Upload service JARs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-jars-${{ github.sha }}
          path: |
            */target/*.jar
            !*/target/original-*.jar
          if-no-files-found: error
          retention-days: 1

  publish:
    if: github.event_name == 'push'
    name: Publish ${{ matrix.service }}
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - auth-service
          - clinic-service
          - appointment-service
          - clinical-records-service
          - admin-server
          - notification-service
          - genai-service
          - user-profile-service
          - system-service
          - audit-service
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download packaged JARs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-jars-${{ github.sha }}
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dentistdss-${{ matrix.service }}:${{ env.BACKEND_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/dentistdss-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.BACKEND_TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  publish-visibility:
    name: Verify public package access
    needs: publish
    if: github.event_name == 'push' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Verify anonymous manifest access
        run: |
          set -o errexit -o nounset -o pipefail
          services=(
            config-server discovery-server api-gateway auth-service
            clinic-service appointment-service clinical-records-service
            admin-server notification-service genai-service
            user-profile-service system-service audit-service
          )
          for service in "${services[@]}"; do
            token="$(
              curl --fail --silent --show-error \
                "https://ghcr.io/token?scope=repository:${GITHUB_REPOSITORY_OWNER}/dentistdss-${service}:pull" |
                jq --exit-status --raw-output '.token'
            )"
            curl --fail --silent --show-error \
              --header "Authorization: Bearer ${token}" \
              --header "Accept: application/vnd.oci.image.index.v1+json" \
              "https://ghcr.io/v2/${GITHUB_REPOSITORY_OWNER}/dentistdss-${service}/manifests/${BACKEND_TAG}" \
              >/dev/null
          done

  promote-dev:
    name: Promote images to dev GitOps
    needs:
      - package
      - publish
      - publish-visibility
    if: github.event_name == 'push' && needs.publish-visibility.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out published revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create immutable dev GitOps revision
        run: |
          git checkout --detach "${GITHUB_SHA}"
          sed -i "s/^  imageTag:.*/  imageTag: ${BACKEND_TAG}/" deploy/chart/values-dev.yaml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deploy/chart/values-dev.yaml
          git commit -m "deploy: promote ${BACKEND_TAG} to dev [skip ci]"
          git push --force origin HEAD:gitops-dev

  promote-production:
    name: Promote images to production GitOps
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: homelab-production
    permissions:
      contents: write
      packages: read
    steps:
      - name: Check out protected main branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Require an immutable SHA tag
        run: |
          if [[ ! "${BACKEND_TAG}" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "::error::backend_tag must match sha-<40 lowercase hex characters>"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify every promoted image exists
        run: |
          services=(
            config-server discovery-server api-gateway auth-service
            clinic-service appointment-service clinical-records-service
            admin-server notification-service genai-service
            user-profile-service system-service audit-service
          )
          for service in "${services[@]}"; do
            docker buildx imagetools inspect \
              "${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/dentistdss-${service}:${BACKEND_TAG}" \
              >/dev/null
          done

      - name: Create immutable production GitOps revision
        run: |
          git checkout --detach "${GITHUB_SHA}"
          sed -i "s/^  imageTag:.*/  imageTag: ${BACKEND_TAG}/" deploy/chart/values-prod.yaml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deploy/chart/values-prod.yaml
          git commit -m "deploy: promote ${BACKEND_TAG} to production [skip ci]"
          git push --force origin HEAD:gitops-prod
