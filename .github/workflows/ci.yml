name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile and test
        run: ./mvnw --batch-mode --no-transfer-progress verify -Pprod

  deployment-contract:
    name: Validate deployment contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose model
        run: docker compose --env-file deploy/.env.example --file deploy/compose.yml config --quiet

      - name: Validate RKE2 Helm chart
        run: |
          helm lint deploy/chart --values deploy/chart/values-dev.yaml
          helm template dentistdss deploy/chart \
            --namespace dev-dentistdss \
            --values deploy/chart/values-dev.yaml \
            >/tmp/dentistdss-dev.yaml
          helm lint deploy/chart --values deploy/chart/values-prod.yaml
          helm template dentistdss deploy/chart \
            --namespace prod-dentistdss \
            --values deploy/chart/values-prod.yaml \
            >/tmp/dentistdss-prod.yaml
          test "$(grep -c '^kind: Deployment$' /tmp/dentistdss-dev.yaml)" -eq 12
          test "$(grep -c '^kind: Deployment$' /tmp/dentistdss-prod.yaml)" -eq 12
          for manifest in /tmp/dentistdss-dev.yaml /tmp/dentistdss-prod.yaml; do
            awk '
              function validate_document() {
                if (is_deployment && is_config_server && has_config_import) {
                  print "config-server must not set SPRING_CONFIG_IMPORT" > "/dev/stderr"
                  exit 1
                }
              }
              /^---$/ {
                validate_document()
                is_deployment = 0
                is_config_server = 0
                has_config_import = 0
                next
              }
              $0 == "kind: Deployment" { is_deployment = 1 }
              $0 == "  name: config-server" { is_config_server = 1 }
              $0 ~ /- name: SPRING_CONFIG_IMPORT$/ { has_config_import = 1 }
              END { validate_document() }
            ' "$manifest"
          done

      - name: Validate deployment scripts
        run: bash -n deploy/scripts/*.sh

      - name: Reject executable database design documents
        run: |
          if head -n 1 docker-entrypoint-initdb.d/01-init.sql | grep -q '^Enum '; then
            echo "::notice::Legacy 01-init.sql is DBML and is intentionally excluded from deploy/compose.yml"
          fi
