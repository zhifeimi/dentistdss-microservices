server:
  port: 8087

spring:
  application:
    name: audit-service
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888

  mongodb:
    uri: mongodb://dentistdss:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/dentistdss?authSource=admin
    database: dentistdss

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}/auth/oauth2/jwks

jwt:
  issuer: ${JWT_ISSUER:http://api-gateway:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}

app:
  security:
    service-auth:
      audience: audit-service
      trusted-keys:
        auth:
          key-id: ${SERVICE_AUTH_KEY_ID_AUTH:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_AUTH:}
          subject: auth-service
          scopes:
            - audit:ingest

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    preferIpAddress: false

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO