# =============================================================================
# API Gateway Configuration - Docker Profile
# =============================================================================

server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}/auth/oauth2/jwks
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2s
  cloud:
    gateway:
      # =============================================================================
      # Global Configuration
      # =============================================================================
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "https://dentist.mizhifei.press"
                  - "https://dentistdss.vercel.app"
                  - "https://dentistgpt.vercel.app"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                  - HEAD
                allowedHeaders:
                  - "Authorization"
                  - "Content-Type"
                  - "Accept"
                  - "Cache-Control"
                  - "Last-Event-ID"
                  - "X-XSRF-TOKEN"
                  - "X-Session-ID"
                allowCredentials: true
                exposedHeaders:
                  - "X-Session-ID"
                  - "X-XSRF-TOKEN"
                maxAge: 3600
          routes:
            # =============================================================================
            # Authentication & Authorization Services
            # =============================================================================

            # Authentication Service - JWT token management
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            # Google ID-token exchange endpoints
            - id: auth-service-oauth2
              uri: lb://auth-service
              predicates:
                - Path=/oauth2/**
              filters:
                - StripPrefix=0

            # =============================================================================
            # Business Domain Services
            # =============================================================================

            # Clinic Management Service
            - id: clinic-service
              uri: lb://clinic-service
              predicates:
                - Path=/api/clinic/**
              filters:
                - StripPrefix=1

            # Appointment Service
            - id: appointment-service
              uri: lb://appointment-service
              predicates:
                - Path=/api/appointment/**
              filters:
                - StripPrefix=1

            # Clinical Records Service
            - id: clinical-records-service
              uri: lb://clinical-records-service
              predicates:
                - Path=/api/clinical-records/**
              filters:
                - StripPrefix=1

            # User Profile Service (Patient and User Management)
            - id: user-profile-service-patient
              uri: lb://user-profile-service
              predicates:
                - Path=/api/patient/**
              filters:
                - StripPrefix=1

            # User Profile Service (User Management)
            - id: user-profile-service-user
              uri: lb://user-profile-service
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=1

            # User Profile Service (Dentist Management)
            - id: user-profile-service-dentist
              uri: lb://user-profile-service
              predicates:
                - Path=/api/dentist/**
              filters:
                - StripPrefix=1

            # AI/GenAI Service
            - id: genai-service
              uri: lb://genai-service
              predicates:
                - Path=/api/genai/**
              filters:
                - PreserveHostHeader
                - StripPrefix=1

            # =============================================================================
            # System & Infrastructure Services
            # =============================================================================

            # System Management Service
            - id: system-service
              uri: lb://system-service
              predicates:
                - Path=/api/system/**
              filters:
                - StripPrefix=1

            # Audit & Logging Service
            - id: audit-service
              uri: lb://audit-service
              predicates:
                - Path=/api/audit/**
              filters:
                - StripPrefix=1

            # Notification Service
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notification/**
              filters:
                - StripPrefix=1

            # =============================================================================
            # OpenAPI Documentation Routes (Docker Development)
            # =============================================================================

            # Authentication Service Documentation (includes OAuth functionality)
            - id: auth-service-openapi
              uri: lb://auth-service
              predicates:
                - Path=/auth-service/v3/api-docs
              filters:
                - StripPrefix=1

            # Clinic Service Documentation
            - id: clinic-service-openapi
              uri: lb://clinic-service
              predicates:
                - Path=/clinic-service/v3/api-docs
              filters:
                - StripPrefix=1

            # Appointment Service Documentation
            - id: appointment-service-openapi
              uri: lb://appointment-service
              predicates:
                - Path=/appointment-service/v3/api-docs
              filters:
                - StripPrefix=1

            # Clinical Records Service Documentation
            - id: clinical-records-service-openapi
              uri: lb://clinical-records-service
              predicates:
                - Path=/clinical-records-service/v3/api-docs
              filters:
                - StripPrefix=1

            # User Profile Service Documentation
            - id: user-profile-service-openapi
              uri: lb://user-profile-service
              predicates:
                - Path=/user-profile-service/v3/api-docs
              filters:
                - StripPrefix=1

            # GenAI Service Documentation
            - id: genai-service-openapi
              uri: lb://genai-service
              predicates:
                - Path=/genai-service/v3/api-docs
              filters:
                - StripPrefix=1

            # System Service Documentation
            - id: system-service-openapi
              uri: lb://system-service
              predicates:
                - Path=/system-service/v3/api-docs
              filters:
                - StripPrefix=1

            # Audit Service Documentation
            - id: audit-service-openapi
              uri: lb://audit-service
              predicates:
                - Path=/audit-service/v3/api-docs
              filters:
                - StripPrefix=1

            # Notification Service Documentation
            - id: notification-service-openapi
              uri: lb://notification-service
              predicates:
                - Path=/notification-service/v3/api-docs
              filters:
                - StripPrefix=1

      # =============================================================================
      # Route Configuration
      # =============================================================================

# =============================================================================
# JWT and Session Security
# =============================================================================
jwt:
  issuer: ${JWT_ISSUER:http://api-gateway:8080}
  audience: ${JWT_AUDIENCE:dentistdss-api}

app:
  security:
    genai-service-auth:
      private-key: ${GENAI_SERVICE_AUTH_PRIVATE_KEY:}
      public-key: ${GENAI_SERVICE_AUTH_PUBLIC_KEY:}
      key-id: ${GENAI_SERVICE_AUTH_KEY_ID:}
    anonymous-session:
      namespace: ${ANONYMOUS_SESSION_NAMESPACE:docker}
      ttl: ${ANONYMOUS_SESSION_TTL:PT24H}
      proof-ttl: ${ANONYMOUS_SESSION_PROOF_TTL:PT30S}
    anonymous-session-proof-issuance:
      source-limit: ${ANONYMOUS_SESSION_PROOF_SOURCE_LIMIT:60}
      global-limit: ${ANONYMOUS_SESSION_PROOF_GLOBAL_LIMIT:5000}
      window: ${ANONYMOUS_SESSION_PROOF_WINDOW:PT1M}
    anonymous-session-issuance:
      fingerprint-key: ${ANONYMOUS_SESSION_FINGERPRINT_KEY:docker-development-fingerprint-key-change-me}
      trusted-proxy-count: ${ANONYMOUS_SESSION_TRUSTED_PROXY_COUNT:0}

# =============================================================================
# Service Discovery Configuration
# =============================================================================
eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    preferIpAddress: false
    securePortEnabled: true
    nonSecurePortEnabled: false
    securePort: 443

# =============================================================================
# OpenAPI/SpringDoc Configuration - Docker Development Profile
# =============================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
    groups:
      enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: auth-service (includes OAuth)
        url: /auth-service/v3/api-docs
      - name: clinic-service
        url: /clinic-service/v3/api-docs
      - name: appointment-service
        url: /appointment-service/v3/api-docs
      - name: clinical-records-service
        url: /clinical-records-service/v3/api-docs
      - name: genai-service
        url: /genai-service/v3/api-docs
      - name: user-profile-service
        url: /user-profile-service/v3/api-docs
      - name: system-service
        url: /system-service/v3/api-docs
      - name: audit-service
        url: /audit-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =============================================================================
# Management & Actuator Configuration
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      access: READ_ONLY
