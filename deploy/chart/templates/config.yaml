apiVersion: v1
kind: ConfigMap
metadata:
  name: dentistdss-config
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
data:
  application.yml: |
{{ .Files.Get "files/application.yml" | indent 4 }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.storeName }}
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ required "externalSecrets.vaultServer is required" .Values.externalSecrets.vaultServer | quote }}
      path: kv
      version: v2
      caProvider:
        type: ConfigMap
        name: vault-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        tokenSecretRef:
          name: {{ .Values.externalSecrets.tokenSecretName }}
          key: token
{{- $storeName := .Values.externalSecrets.storeName }}
{{- $runtimePath := .Values.externalSecrets.runtimePath }}
{{- range $secretName, $keys := .Values.externalSecrets.records }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "dentistdss.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ $storeName }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ $runtimePath | quote }}
        property: {{ . }}
    {{- end }}
{{- end }}
{{ if index .Values.services "genai-service" "enabled" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dentistdss-genai-service-auth
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: {{ .Values.externalSecrets.genaiStoreKind | default "ClusterSecretStore" }}
    name: {{ .Values.externalSecrets.genaiStoreName | default "homelab-vault" }}
  target:
    name: dentistdss-genai-service-auth
    creationPolicy: Owner
  data:
    - secretKey: GENAI_SERVICE_AUTH_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.genaiServiceAuthPath | quote }}
        property: GENAI_SERVICE_AUTH_PRIVATE_KEY
    - secretKey: GENAI_SERVICE_AUTH_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.genaiServiceAuthPath | quote }}
        property: GENAI_SERVICE_AUTH_PUBLIC_KEY
    - secretKey: GENAI_SERVICE_AUTH_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecrets.genaiServiceAuthPath | quote }}
        property: GENAI_SERVICE_AUTH_KEY_ID
{{ end }}
