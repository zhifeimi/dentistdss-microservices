apiVersion: v1
kind: ConfigMap
metadata:
  name: dentistdss-config
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
data:
  application.yml: |
{{ .Files.Get "files/application.yml" | indent 4 }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.storeName }}
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ required "externalSecrets.vaultServer is required" .Values.externalSecrets.vaultServer | quote }}
      path: kv
      version: v2
      caProvider:
        type: ConfigMap
        name: vault-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        tokenSecretRef:
          name: {{ .Values.externalSecrets.tokenSecretName }}
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dentistdss-runtime
  labels:
    {{- include "dentistdss.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.externalSecrets.storeName }}
  target:
    name: dentistdss-runtime
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.runtimePath | quote }}
