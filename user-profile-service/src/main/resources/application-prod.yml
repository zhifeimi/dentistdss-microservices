server:
  port: 8085

spring:
  application:
    name: user-profile-service
  config:
    import: optional:configserver:http://${SPRING_CONFIG_USER}:${SPRING_CONFIG_PASS}@config-server:8888

  datasource:
    url: jdbc:postgresql://postgres:5432/dentistdss
    username: dentistdss
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}/auth/oauth2/jwks
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      # Required in production: fail closed instead of connecting
      # unauthenticated when the deployment forgets the password.
      password: ${REDIS_PASSWORD}
      timeout: 2s

jwt:
  issuer: ${JWT_ISSUER:https://api.mizhifei.press}
  audience: ${JWT_AUDIENCE:dentistdss-api}

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    preferIpAddress: false

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info  # Minimal exposure for production
  endpoint:
    health:
      show-details: when-authorized
  jmx:
    exposure:
      exclude: "*"  # Disable JMX to avoid RMI issues

# OpenAPI/SpringDoc Configuration - DISABLED for production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    press.mizhifei.dentist: INFO
    org.springframework: INFO
    root: INFO

app:
  security:
    service-auth:
      audience: user-profile-service
      trusted-keys:
        notification:
          key-id: ${SERVICE_AUTH_KEY_ID_NOTIFICATION:}
          public-key: ${SERVICE_AUTH_PUBLIC_KEY_NOTIFICATION:}
          subject: notification-service
          scopes:
            - user:contact:read
